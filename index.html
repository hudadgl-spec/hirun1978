<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Box - GitHub Assignment</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f5f5f5;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            background:white;
            padding:40px;
            border-radius:10px;
            box-shadow:0 0 15px rgba(0,0,0,0.2);
            text-align:center;
        }

        input{
            width:300px;
            padding:12px;
            font-size:16px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            padding:12px 20px;
            margin-left:10px;
            background:#007BFF;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        h2{
            margin-bottom:25px;
        }
    </style>

</head>

<body>

<div class="box">

<h2>Search Box</h2>

<form action="https://formspree.io/f/xojaevjr" method="POST">

<input
type="text"
name="Search_Text"
placeholder="Enter anything..."
required>

<button type="submit">
Search
</button>

</form>

</div>

</body>
</html>

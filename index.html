<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assignment 11 - Search Box</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:40px;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
    text-align:center;
}

h1{
    color:#333;
    margin-bottom:25px;
}

form{
    display:flex;
    justify-content:center;
    gap:10px;
}

input[type="text"]{
    width:320px;
    padding:12px;
    font-size:16px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    padding:12px 20px;
    background:#007BFF;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0056b3;
}
</style>

</head>
<body>

<div class="container">

<h1>Search Box</h1>

<form action="https://formspree.io/f/xojaevjr" method="POST">

<input
type="text"
name="Search_Text"
placeholder="Type anything here..."
required>

<button type="submit">Search</button>

</form>

</div>

</body>
</html>
